name: Deploy via SSM (Free Tier)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: ha-lab-deploy-bucket-154102274785
  ASG_NAME: ha-lab-asg
  DEPLOY_DIR: /var/www/html
  APP_VERSION: ${{ github.sha }}

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inject version info
        run: |
          DEPLOY_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ -f index.html ]; then
            sed -i "s/배포 버전:[^<]*/배포 버전: ${SHORT_SHA} (${DEPLOY_TIME})/" index.html || true
            sed -i "s/배포버전:[^<]*/배포버전: ${SHORT_SHA} (${DEPLOY_TIME})/" index.html || true
          fi

      - name: Upload to S3
        run: |
          zip -r deploy-${APP_VERSION}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "tests/*" \
            --exclude "deploy-*.zip"

          aws s3 cp deploy-${APP_VERSION}.zip \
            s3://${S3_BUCKET}/releases/deploy-${APP_VERSION}.zip

          aws s3 cp deploy-${APP_VERSION}.zip \
            s3://${S3_BUCKET}/releases/deploy-latest.zip

      - name: Get ASG instance IDs
        id: get_instances
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${ASG_NAME}" \
            --query 'AutoScalingGroups[0].Instances[].InstanceId'
            --output text | tr '\t' ' ')

          echo "instance_ids=${INSTANCE_IDS}" >> $GITHUB_OUTPUT

      - name: Deploy via SSM
        run: |
          if [ -z "${{ steps.get_instances.outputs.instance_ids }}" ]; then
            echo "배포할 InService 인스턴스가 없습니다."
            exit 1
          fi

          for INSTANCE_ID in ${{ steps.get_instances.outputs.instance_ids }}; do
            echo "배포 시작: $INSTANCE_ID"

            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy static app from S3" \
              --parameters 'commands=[
                "set -e",
                "aws s3 cp s3://'${S3_BUCKET}'/releases/deploy-'${APP_VERSION}'.zip /tmp/deploy.zip",
                "sudo rm -rf /tmp/deploy",
                "mkdir -p /tmp/deploy",
                "unzip -o /tmp/deploy.zip -d /tmp/deploy",
                "sudo rm -rf '${DEPLOY_DIR}'/*",
                "sudo cp -r /tmp/deploy/* '${DEPLOY_DIR}'/",
                "sudo nginx -t",
                "sudo systemctl reload nginx",
                "curl -sf http://localhost/health"
              ]' \
              --timeout-seconds 300 \
              --query "Command.CommandId" \
              --output text)

            echo "SSM Command ID: $CMD_ID"

            for i in $(seq 1 30); do
              sleep 10

              STATUS=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --query Status \
                --output text 2>/dev/null || echo Pending)

              echo "SSM 상태: $STATUS"

              if [ "$STATUS" = "Success" ]; then
                break
              fi

              if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
                echo "❌ SSM 배포 실패"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --output text || true
                exit 1
              fi
            done

            if [ "$STATUS" != "Success" ]; then
              echo "❌ SSM 배포 시간 초과"
              exit 1
            fi

            echo "✅ $INSTANCE_ID 배포 완료"
          done

      - name: Verify via ALB
        run: |
          curl -sf --max-time 10 http://${{ secrets.ALB_DNS }}
          echo "✅ ALB 정상"
